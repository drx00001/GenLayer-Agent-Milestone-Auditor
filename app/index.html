<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GenLayer Agent Milestone Auditor</title>
  <style>
    :root{color-scheme:light;--bg:#f7f8f4;--panel:#fff;--ink:#16181d;--muted:#667085;--line:#d8ded2;--accent:#166534}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    main{max-width:1160px;margin:auto;padding:28px 18px 44px}
    h1{margin:0 0 6px;font-size:30px}
    h2{margin:0 0 12px;font-size:18px}
    p{margin:0 0 18px;color:var(--muted);line-height:1.55}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
    section{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:16px}
    label{display:block;margin:13px 0 6px;font-weight:700}
    input,textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;font:inherit;background:#fff}
    textarea{min-height:120px;resize:vertical}
    .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .checks label{display:flex;gap:8px;align-items:center;margin:0;font-weight:600;color:#27313f}
    .checks input{width:auto}
    button,a{display:inline-flex;align-items:center;margin-top:14px;margin-right:8px;border:0;border-radius:6px;padding:10px 14px;background:#151515;color:#fff;font:inherit;font-weight:700;text-decoration:none;cursor:pointer}
    a{background:var(--accent)}
    pre{min-height:88px;white-space:pre-wrap;overflow:auto;border-radius:6px;background:#182027;color:#edf7f0;padding:12px}
    .score{font-size:34px;font-weight:800;color:var(--accent)}
    @media(max-width:800px){.grid,.checks{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main>
    <h1>GenLayer Agent Milestone Auditor</h1>
    <p>用于 AI 代理项目的里程碑验收: 生成部署参数、证据包、证据哈希和确定性预评分，再交给 GenLayer validators 做 AI 共识判定。</p>

    <div class="grid">
      <section>
        <h2>项目与合约参数</h2>
        <label for="project">project_name</label>
        <input id="project" value="AI Agent Delivery Milestone Audit">
        <label for="requirements">buyer_requirements</label>
        <textarea id="requirements">Agent must deliver a runnable GenLayer milestone with contract logic, tests, frontend integration, deployment instructions, and evidence that the milestone was used end-to-end.</textarea>
        <label>release / revision / reject bps</label>
        <input id="release" value="8500">
        <input id="revision" value="5000">
        <input id="reject" value="0">
      </section>

      <section>
        <h2>里程碑证据</h2>
        <label for="milestone">milestone_name</label>
        <input id="milestone" value="M1: runnable GenLayer audit workflow">
        <div class="checks">
          <label><input id="hasContract" type="checkbox" checked> 合约逻辑</label>
          <label><input id="hasTests" type="checkbox" checked> 测试</label>
          <label><input id="hasFrontend" type="checkbox" checked> 前端集成</label>
          <label><input id="hasDeploy" type="checkbox" checked> 部署步骤</label>
          <label><input id="hasProof" type="checkbox" checked> 截图或日志证据</label>
        </div>
        <label for="notes">evidence notes</label>
        <textarea id="notes">Contract deployed in GenLayer Studio, submit_milestone called with generated evidence JSON, verdict returned accepted with release_bps above threshold.</textarea>
        <button id="build">生成调用参数</button>
        <a href="https://studio.genlayer.com/contracts" target="_blank" rel="noreferrer">打开 GenLayer Studio</a>
      </section>
    </div>

    <div class="grid" style="margin-top:16px">
      <section>
        <h2>确定性预评分</h2>
        <div class="score" id="score">0</div>
        <pre id="evidence"></pre>
      </section>
      <section>
        <h2>合约调用参数</h2>
        <label>constructor args</label>
        <pre id="constructor"></pre>
        <label>submit_milestone args</label>
        <pre id="submit"></pre>
      </section>
    </div>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const enc = new TextEncoder();

    async function sha256(text) {
      const hash = await crypto.subtle.digest("SHA-256", enc.encode(text));
      return [...new Uint8Array(hash)].map(x => x.toString(16).padStart(2, "0")).join("");
    }

    function bool(id) {
      return $(id).checked;
    }

    async function render() {
      const evidence = {
        contract: bool("hasContract"),
        tests: bool("hasTests"),
        frontend: bool("hasFrontend"),
        deployment_steps: bool("hasDeploy"),
        screenshots_or_logs: bool("hasProof"),
        notes: $("notes").value,
        generated_at: new Date().toISOString()
      };
      const score = (evidence.contract ? 25 : 0) + (evidence.tests ? 20 : 0) + (evidence.frontend ? 20 : 0) + (evidence.deployment_steps ? 20 : 0) + (evidence.screenshots_or_logs ? 15 : 0);
      const evidenceJson = JSON.stringify(evidence, null, 2);
      const hash = await sha256(evidenceJson);

      $("score").textContent = `${score}/100`;
      $("evidence").textContent = evidenceJson;
      $("constructor").textContent = JSON.stringify([$("project").value, $("requirements").value, Number($("release").value), Number($("revision").value), Number($("reject").value)], null, 2);
      $("submit").textContent = JSON.stringify([$("milestone").value, evidenceJson, hash, score], null, 2);
    }

    $("build").addEventListener("click", render);
    render();
  </script>
</body>
</html>
